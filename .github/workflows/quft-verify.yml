name: QUFT Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install JAX dependencies
        run: |
          pip install "jax[cpu]"

      - name: Run Bootstrap & JAX Hessian Tests
        run: |
          pytest tests/test_bootstrap_jax.py -v --junitxml=results_bootstrap.xml
          pytest tests/test_regression.py tests/test_nonperturbative_unitarity.py -v --junitxml=results_opt.xml
