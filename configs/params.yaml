roadmap:
  f2_target: 1.0e-8
  M2_GeV: 2.4e23
  alpha_inelastic: 0.05
  froissart_C: 0.25
  froissart_s0: 1.0

solver:
  rtol: 1.0e-8
  atol: 1.0e-10
  max_iter: 10000
  checkpoint_interval: 500

assumptions:
  perturbative_bound: 1.0
  pl_constant_lb: 2.4e-2
  lyapunov_decay_min: 1.5e-2
  thermal_T_reh_max: 1.0e15
